{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="card shadow-lg border-0 rounded-4 text-center p-5">
        <div class="card-body">
            <h2 class="fw-bold text-success mb-3">Payment Successful 🎉</h2>
            <p class="fs-5">Thank you for your order!</p>
            <p class="text-muted">Payment ID: <strong>{{ order.razorpay_payment_id }}</strong></p>
            <p class="text-muted">Order ID: <strong>{{ order.razorpay_order_id }}</strong></p>

            <a href="{% url 'menu' %}" class="btn btn-danger mt-4 px-4 rounded-pill">
                Continue Shopping
            </a>
        </div>
    </div>
</div>

{% endblock content %}
